name: Homologation

on:
  workflow_dispatch:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.1.0
        with:
          fetch-depth: 2

      - name: Install dependencies
        uses: borales/actions-yarn@v2.0.0
        with:
          cmd: install

      - name: Build application
        uses: borales/actions-yarn@v2.0.0
        with:
          cmd: build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v2.1.4
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOM_KEY }}
          REMOTE_HOST: ${{ secrets.HOM_HOST }}
          REMOTE_PORT: ${{ secrets.HOM_PORT }}
          REMOTE_USER: ${{ secrets.HOM_USER }}
          SOURCE: './dist/*'
          TARGET: '~/public_html/vendas-minisitio/public'