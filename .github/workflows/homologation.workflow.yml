name: Homologation

on:
  workflow_dispatch:
    branches:
      - develop

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Remove vendor directory
        uses: fifsky/ssh-action@master
        with:
          command: |
            cd ~/public_html/vendas_minisitio/
            rm -rf vendor/
          host: ${{ secrets.HOM_HOST }}
          port: ${{ secrets.HOM_PORT }}
          user: ${{ secrets.HOM_USER }}
          key: ${{ secrets.HOM_KEY }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.1.0
        with:
          fetch-depth: 2

      - name: Setup enviroment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install composer dependencies
        run: composer install --dev --no-ansi --no-interaction --no-scripts --no-suggest --no-progress --prefer-dist

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v2.1.4
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOM_KEY }}
          REMOTE_HOST: ${{ secrets.HOM_HOST }}
          REMOTE_PORT: ${{ secrets.HOM_PORT }}
          REMOTE_USER: ${{ secrets.HOM_USER }}
          SOURCE: './'
          TARGET: '~/public_html/vendas_minisitio/'

  post-deploy:
    name: Run configurations
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run migrations and seeders, clear cache for views, config and routes
        uses: fifsky/ssh-action@master
        with:
          command: |
            cd ~/public_html/vendas_minisitio/
            php artisan config:clear
            php artisan view:clear
            php artisan route:cache
          host: ${{ secrets.HOM_HOST }}
          port: ${{ secrets.HOM_PORT }}
          user: ${{ secrets.HOM_USER }}
          key: ${{ secrets.HOM_KEY }}
