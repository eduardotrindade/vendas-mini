name: Homologation

on:
  workflow_dispatch:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v1

      - name: Setup enviroment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install composer dependencies
        run: composer install --dev --no-ansi --no-interaction --no-scripts --no-suggest --no-progress --prefer-dist

      - name: Create env file
        env:
          HOM_ENV_FILE: ${{ secrets.HOM_ENV_FILE }}
        run: |
          echo $HOM_ENV_FILE | base64 --decode > .env
          php artisan key:generate --ansi
          php artisan jwt:secret --force

      - name: Confirming the deployment changes
        run: |
          rm -rf .gitignore
          git config --global user.email "felipemjesus@outlook.com"
          git config --global user.name "Felipe Martins"
          git add .
          git commit -m "Deploy"

      - name: Deploy to server
        uses: sebastianpopp/git-ftp-action@releases/v3
        with:
          url: ${{ secrets.HOM_FTP_HOST }}
          user: ${{ secrets.HOM_USER }}
          password: ${{ secrets.HOM_PASSWORD }}
          options: '--auto-init --force --verbose'

  post-deploy:
    name: Run configurations
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run migrations and seeders, clear cache for views, config and routes
        uses: fifsky/ssh-action@master
        with:
          command: |
            cd ~/public_html/vendas-minisitio
            php artisan migrate
            php artisan config:clear
            php artisan view:clear
            php artisan route:clear
          host: ${{ secrets.HOM_HOST }}
          port: ${{ secrets.HOM_PORT }}
          user: ${{ secrets.HOM_USER }}
          key: ${{ secrets.HOM_KEY }}
