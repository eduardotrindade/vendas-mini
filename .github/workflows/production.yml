name: 🚀 Production Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: resources/vue/package-lock.json

      - name: Install frontend dependencies and build
        run: |
          cd ./resources/vue/
          npm ci
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: bcmath, gd, intl, mbstring, mysql, pdo, pdo_mysql, zip, soap
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer install --prefer-dist --no-dev --optimize-autoloader --no-scripts --no-interaction

      - name: Generate application keys
        env:
          ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          echo $ENV_FILE | base64 --decode > .env
          php artisan key:generate --force
          php artisan jwt:secret --force
          php artisan config:clear
          php artisan view:clear
          php artisan route:clear
          php artisan cache:clear

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            .
            !.git
            !node_modules
            !resources/vue/node_modules

      - name: Deploy to production FTP
        uses: airvzxf/ftp-deployment-action@latest
        with:
          server: ${{ secrets.PROD_FTP_URL }}
          user: ${{ secrets.PROD_FTP_USER }}
          password: ${{ secrets.PROD_FTP_PWD }}
          local_dir: "./"
          remote_dir: "/vendas"
          ftp_ssl_allow: "true"