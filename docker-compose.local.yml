volumes:
  mysql_local:

services:
  mysql:
    image: 'mysql:5.7'
    working_dir: /application
    volumes:
      - '.:/application'
      - 'mysql_local:/var/lib/mysql'
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=vendas_minisitio
      - MYSQL_USER=mycardcity
      - MYSQL_PASSWORD=Dxktior@1324!
    ports:
      - '3307:3306'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  php-fpm:
    image: felipemjesus/php:7.4-fpm
    working_dir: /application
    volumes:
      - '.:/application'
      - './.docker/php-fpm/php-ini-overrides.ini:/etc/php/7.4/fpm/conf.d/99-overrides.ini'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  webserver:
    image: 'nginx:alpine'
    working_dir: /application
    volumes:
      - '.:/application'
      - './.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
    ports:
      - '8003:80'
    depends_on:
      - php-fpm
